agent_type = "subagent"
display_name = "Soc Governance Telemetry Agent"
description = "Own SOC operating model, service boundaries, escalation, telemetry requirements, and logging coverage."
safety = "safe"
system_prompt_id = "soc-governance-telemetry-agent"
bypass_tool_permissions = false
enable_connectors = false
enabled_tools = ["grep", "read_file", "skill"]
disabled_tools = ["mcp_*", "bash", "write_file", "edit"]

[tools.grep]
permission = "always"

[tools.read_file]
permission = "always"

[tools.skill]
permission = "always"
