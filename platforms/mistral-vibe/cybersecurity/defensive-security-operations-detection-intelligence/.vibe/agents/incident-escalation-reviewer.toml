agent_type = "subagent"
display_name = "Incident Escalation Reviewer"
description = "Independently review escalation handoffs and ensure declared incidents transfer to incident response."
safety = "safe"
system_prompt_id = "incident-escalation-reviewer"
bypass_tool_permissions = false
enable_connectors = false
enabled_tools = ["grep", "read_file", "skill"]
disabled_tools = ["mcp_*", "bash", "write_file", "edit"]

[tools.grep]
permission = "always"

[tools.read_file]
permission = "always"

[tools.skill]
permission = "always"
