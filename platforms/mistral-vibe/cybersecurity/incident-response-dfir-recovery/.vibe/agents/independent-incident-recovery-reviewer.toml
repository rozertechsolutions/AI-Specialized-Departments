agent_type = "subagent"
display_name = "Independent Incident Recovery Reviewer"
description = "Independently review high-impact incident, DFIR, recovery, and closure packages."
safety = "safe"
system_prompt_id = "independent-incident-recovery-reviewer"
bypass_tool_permissions = false
enable_connectors = false
enabled_tools = ["grep", "read_file", "skill"]
disabled_tools = ["mcp_*", "bash", "write_file", "edit"]

[tools.grep]
permission = "always"

[tools.read_file]
permission = "always"

[tools.skill]
permission = "always"
