agent_type = "subagent"
display_name = "Independent Offensive Safety Reviewer"
description = "Independently review scope, authorization, safety, report quality, and retest readiness."
safety = "safe"
system_prompt_id = "independent-offensive-safety-reviewer"
bypass_tool_permissions = false
enable_connectors = false
enabled_tools = ["grep", "read_file", "skill"]
