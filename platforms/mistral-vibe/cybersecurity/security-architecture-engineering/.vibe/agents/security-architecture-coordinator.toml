agent_type = "agent"
display_name = "Security Architecture Coordinator"
description = "Safe coordinator for cybersecurity security architecture and engineering design, review, documentation, patterns, and assurance."
safety = "neutral"
system_prompt_id = "security-architecture-coordinator"
bypass_tool_permissions = false
enable_connectors = false
enabled_tools = ["grep", "read_file", "skill", "todo", "ask_user_question", "task"]
