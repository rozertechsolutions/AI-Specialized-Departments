# Native Mistral Vibe project configuration, verified against v2.19.1.
default_agent = "mobile-development"
bypass_tool_permissions = false
disabled_agents = ["auto-approve"]

# Keep remote and experimental capability surfaces inactive in this specialization.
enable_connectors = false
experimental_enable_registry_skills = false
enable_experimental_hooks = false
experimental_bash_tool = false

# This project-local tool list prevents MCP, connector, web, and custom-tool use.
# MCP servers supplied by higher-precedence runtime/environment overrides may still
# connect before tool filtering, so this file intentionally defines no server.
enabled_tools = [
  "grep",
  "read_file",
  "skill",
  "todo",
  "ask_user_question",
  "task",
  "write_file",
  "edit",
  "bash",
]
disabled_tools = ["mcp_*"]

[tools.grep]
permission = "always"
sensitive_patterns = ["**/.env", "**/.env.*", "**/gradle.properties"]
denylist = [
  "**/.env",
  "**/.env.*",
  "**/*.jks",
  "**/*.keystore",
  "**/*.p12",
  "**/*.pfx",
  "**/*.mobileprovision",
  "**/*.pem",
  "**/*.key",
  "**/*.p8",
  "**/*.pk8",
  "**/*.pkcs8",
  "**/id_rsa",
  "**/id_ed25519",
  "**/id_dsa",
  "**/id_ecdsa",
  "**/local.properties",
  "**/keystore.properties",
  "**/key.properties",
  "**/.npmrc",
  "**/.netrc",
  "**/.pypirc",
  "**/.envrc",
  "**/.secrets*",
  "**/secrets.properties",
  "**/auth.json",
  "**/credentials.json",
  "**/service-account*.json",
  "**/serviceAccount*.json",
  "**/firebase-adminsdk*.json",
]
# Grep permission checks only the requested root in v2.19.1. These backend
# exclusions prevent recursive searches from returning protected descendants,
# including when default ignore handling is disabled.
exclude_patterns = [
  ".venv/",
  "venv/",
  ".env/",
  "env/",
  "node_modules/",
  ".git/",
  "__pycache__/",
  ".pytest_cache/",
  ".mypy_cache/",
  ".tox/",
  ".nox/",
  ".coverage/",
  "htmlcov/",
  "dist/",
  "build/",
  ".idea/",
  ".vscode/",
  "*.egg-info",
  "*.pyc",
  "*.pyo",
  "*.pyd",
  ".DS_Store",
  "Thumbs.db",
  ".env",
  ".env.*",
  "*.jks",
  "*.keystore",
  "*.p12",
  "*.pfx",
  "*.mobileprovision",
  "*.pem",
  "*.key",
  "*.p8",
  "*.pk8",
  "*.pkcs8",
  "id_rsa",
  "id_ed25519",
  "id_dsa",
  "id_ecdsa",
  # Gradle project properties can contain credentials. Exclude them from
  # recursive results; a direct Grep or read_file request still asks approval.
  "gradle.properties",
  "local.properties",
  "keystore.properties",
  "key.properties",
  ".npmrc",
  ".netrc",
  ".pypirc",
  ".envrc",
  ".secrets*",
  "secrets.properties",
  "auth.json",
  "credentials.json",
  "service-account*.json",
  "serviceAccount*.json",
  "firebase-adminsdk*.json",
]

[tools.read_file]
permission = "always"
sensitive_patterns = ["**/.env", "**/.env.*", "**/gradle.properties"]
denylist = [
  "**/.env",
  "**/.env.*",
  "**/*.jks",
  "**/*.keystore",
