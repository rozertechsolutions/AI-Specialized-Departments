  "**/id_rsa",
  "**/id_ed25519",
  "**/id_dsa",
  "**/id_ecdsa",
  "**/local.properties",
  "**/keystore.properties",
  "**/key.properties",
  "**/.npmrc",
  "**/.netrc",
  "**/.pypirc",
  "**/.envrc",
  "**/.secrets*",
  "**/secrets.properties",
  "**/auth.json",
  "**/credentials.json",
  "**/service-account*.json",
  "**/serviceAccount*.json",
  "**/firebase-adminsdk*.json",
]

[tools.skill]
permission = "always"

[tools.todo]
permission = "always"

[tools.ask_user_question]
permission = "always"

[tools.task]
permission = "ask"
# Vibe interprets matches as automatic approval, not exclusive availability.
allowlist = []

