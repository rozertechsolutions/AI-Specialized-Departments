agent_type = "subagent"
display_name = "Mobile Code Reviewer"
description = "Independent read-only final reviewer for correctness, maintainability, regressions, error handling, conventions, tests, and evidence."
safety = "safe"
system_prompt_id = "mobile-code-reviewer"
bypass_tool_permissions = false
enable_connectors = false
enabled_tools = ["grep", "read_file", "skill"]
disabled_tools = ["mcp_*"]

[tools.grep]
permission = "always"

[tools.read_file]
permission = "always"

[tools.skill]
permission = "always"
