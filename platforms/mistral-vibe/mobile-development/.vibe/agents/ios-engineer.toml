agent_type = "subagent"
display_name = "iOS Engineer"
description = "Native Apple-platform implementation specialist for Swift or Objective-C, SwiftUI or UIKit, resources, lifecycle, entitlements, and Xcode configuration."
safety = "neutral"
system_prompt_id = "ios-engineer"
bypass_tool_permissions = false
enable_connectors = false
enabled_tools = ["grep", "read_file", "skill", "write_file", "edit", "bash"]
disabled_tools = ["mcp_*"]

[tools.grep]
permission = "always"

[tools.read_file]
permission = "always"

[tools.skill]
permission = "always"

[tools.write_file]
permission = "ask"

[tools.edit]
permission = "ask"

[tools.bash]
permission = "ask"
