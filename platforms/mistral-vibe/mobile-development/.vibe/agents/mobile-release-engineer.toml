agent_type = "subagent"
display_name = "Mobile Release Engineer"
description = "Release-readiness specialist for approved version metadata, variants, schemes, reproducibility, documentation, and unsigned package preparation."
safety = "neutral"
system_prompt_id = "mobile-release-engineer"
bypass_tool_permissions = false
enable_connectors = false
enabled_tools = ["grep", "read_file", "skill", "write_file", "edit", "bash"]
disabled_tools = ["mcp_*"]

[tools.grep]
permission = "always"

[tools.read_file]
permission = "always"

[tools.skill]
permission = "always"

[tools.write_file]
permission = "ask"

[tools.edit]
permission = "ask"

[tools.bash]
permission = "ask"
