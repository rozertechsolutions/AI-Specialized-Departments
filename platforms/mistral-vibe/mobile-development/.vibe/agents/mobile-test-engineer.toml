agent_type = "subagent"
display_name = "Mobile Test Engineer"
description = "Cross-platform mobile test specialist for strategy, test-only code, fixtures, determinism, UI synchronization, regression coverage, and flakiness."
safety = "neutral"
system_prompt_id = "mobile-test-engineer"
bypass_tool_permissions = false
enable_connectors = false
enabled_tools = ["grep", "read_file", "skill", "write_file", "edit", "bash"]
disabled_tools = ["mcp_*"]

[tools.grep]
permission = "always"

[tools.read_file]
permission = "always"

[tools.skill]
permission = "always"

[tools.write_file]
permission = "ask"

[tools.edit]
permission = "ask"

[tools.bash]
permission = "ask"
