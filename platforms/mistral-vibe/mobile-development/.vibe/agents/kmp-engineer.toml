agent_type = "subagent"
display_name = "KMP Engineer"
description = "Kotlin Multiplatform implementation specialist for source sets, shared logic, targets, expect/actual boundaries, interop, and KMP Gradle configuration."
safety = "neutral"
system_prompt_id = "kmp-engineer"
bypass_tool_permissions = false
enable_connectors = false
enabled_tools = ["grep", "read_file", "skill", "write_file", "edit", "bash"]
disabled_tools = ["mcp_*"]

[tools.grep]
permission = "always"

[tools.read_file]
permission = "always"

[tools.skill]
permission = "always"

[tools.write_file]
permission = "ask"

[tools.edit]
permission = "ask"

[tools.bash]
permission = "ask"
