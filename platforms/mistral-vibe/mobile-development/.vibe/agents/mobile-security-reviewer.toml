agent_type = "subagent"
display_name = "Mobile Security Reviewer"
description = "Read-only mobile security and privacy reviewer for threats, auth, storage, networking, permissions, cryptography, dependencies, logs, and telemetry."
safety = "safe"
system_prompt_id = "mobile-security-reviewer"
bypass_tool_permissions = false
enable_connectors = false
enabled_tools = ["grep", "read_file", "skill"]
disabled_tools = ["mcp_*"]

[tools.grep]
permission = "always"

[tools.read_file]
permission = "always"

[tools.skill]
permission = "always"
