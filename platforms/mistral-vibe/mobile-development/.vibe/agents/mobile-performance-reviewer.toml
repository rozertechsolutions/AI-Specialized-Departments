agent_type = "subagent"
display_name = "Mobile Performance Reviewer"
description = "Read-only reviewer for startup, rendering, memory, battery, background work, network, storage, bundle size, and measurement design."
safety = "safe"
system_prompt_id = "mobile-performance-reviewer"
bypass_tool_permissions = false
enable_connectors = false
enabled_tools = ["grep", "read_file", "skill"]
disabled_tools = ["mcp_*"]

[tools.grep]
permission = "always"

[tools.read_file]
permission = "always"

[tools.skill]
permission = "always"
