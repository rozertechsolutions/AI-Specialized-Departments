manifest_type: policy
schema: ../schemas/policy.schema.json
id: permissions
classification: native
rules:
  routine_reads: allowed_within_reviewed_project_scope
  project_edits: scoped_to_requested_mobile_project
  shell_commands: approval_controlled_and_discovered_from_project
  network: denied_unless_explicitly_approved
  external_integrations: disabled_by_default
  review_roles: read_only_by_default
  destructive_actions: prohibited
human_control_required_for:
  - authentication
  - authorization
  - privacy
  - permissions
  - entitlements
  - network_security
  - deep_links
  - webviews
  - analytics
  - telemetry
  - dependencies
  - lockfiles
  - signing_configuration
  - external_writes
  - publishing
  - deployment
  - credential_import
  - destructive_commands
  - financial_actions
