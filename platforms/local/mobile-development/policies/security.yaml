manifest_type: policy
schema: ../schemas/policy.schema.json
id: security
classification: native
protected_material:
  - secrets
  - tokens
  - passwords
  - private_keys
  - certificates
  - provisioning_profiles
  - keystores
  - service_account_files
  - local_environment_files
  - signing_material
  - private_urls
  - production_personal_data
rules:
  fail_closed_on_malformed_sensitive_config: true
  distinguish_public_mobile_client_configuration: true
  public_client_config_changes_require_review: true
  no_silent_cloud_fallback: true
  no_credential_logging: true
  no_secret_commits: true
guards:
  validate_path_traversal: true
  validate_quoted_paths_and_spaces: true
  validate_shell_chaining_and_redirection: true
  validate_substitution_and_encoded_commands: true
  avoid_false_positive_secret_detection: true
