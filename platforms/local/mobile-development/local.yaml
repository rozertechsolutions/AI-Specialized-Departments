manifest_type: local-specialization
schema: schemas/local.schema.json
id: ai-specialized-departments.local.mobile-development
version: 1.0.0
surface: project-defined-local
status: native
scope:
  root: local/mobile-development
  technologies:
    - android
    - ios
    - kotlin-multiplatform
    - flutter
    - react-native
  forbidden_paths:
    - common
classification:
  native:
    - yaml_manifests
    - json_schemas
    - standard_library_python_guards
    - disabled_provider_examples
    - disabled_mcp_examples
    - least_privilege_tool_contracts
  unsupported:
    - runtime_daemon
    - provider_client
    - model_downloader
    - universal_adapter
    - shared_cross_platform_runtime
    - autonomous_loop
    - active_external_integrations
    - signing_or_publishing
precedence:
  - policies
  - schemas
  - hooks
  - tools
  - agents
  - subagents
  - skills
  - workflows
  - providers
  - mcp
delegation:
  coordinator: agents/mobile-coordinator.yaml
  specialists_directory: subagents
  max_depth: 1
  final_review: mobile-code-reviewer
  self_review_prohibited: true
capability_negotiation:
  provider_routing: capability-based
  remote_use_requires_explicit_consent: true
  no_silent_cloud_fallback: true
  unknown_capability_behavior: fail_closed
lifecycle:
  discovery: validate_manifests_before_use
  activation: human_initiated
  external_integrations_default: disabled
  audit_logging: required_for_decisions_and_approvals
validation:
  schema_directory: schemas
  hook_tests: python3 -m unittest discover -s hooks/tests
  malformed_security_config: fail_closed
references:
  official_documentation:
    - https://modelcontextprotocol.io/docs/getting-started/intro
    - https://docs.ollama.com/
    - https://lmstudio.ai/docs
    - https://github.com/ggml-org/llama.cpp
    - https://docs.vllm.ai/
    - https://docs.sglang.ai/
