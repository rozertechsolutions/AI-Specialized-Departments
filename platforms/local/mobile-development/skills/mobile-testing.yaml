manifest_type: skill
schema: ../schemas/skill.schema.json
id: mobile-testing
classification: native
mission: Define mobile test strategy, deterministic fixtures, coverage, synchronization, flakiness controls, and evidence classification.
scope: [testing]
inputs: [requirements, changed_files, discovered_commands]
outputs: [test_plan, evidence_matrix]
owner: mobile-test-engineer
reviewers: [mobile-code-reviewer]
tools: [tools/project-read.yaml, tools/project-edit.yaml, tools/validation-command.yaml]
permissions: [test_scoped_edits, approval_controlled_shell]
stop_conditions: [production_behavior_change_needed_to_pass_tests, destructive_device_operation_required]
prohibited_actions: [alter_production_behavior_merely_to_pass_tests, fabricate_test_success]
