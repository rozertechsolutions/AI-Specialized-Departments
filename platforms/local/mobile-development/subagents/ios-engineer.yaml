manifest_type: agent
schema: ../schemas/agent.schema.json
id: ios-engineer
classification: native
mission: Implement and validate Swift, SwiftUI/UIKit, Apple APIs, lifecycle, Xcode, schemes, entitlements, resources, localization, and iOS tests.
exclusive_scope: [ios_source, swiftui_uikit, xcode_project, schemes, entitlements, ios_resources, localization, ios_tests]
inputs: [requirements, xcode_projects, schemes, existing_ios_sources]
preconditions: [ios_project_detected, signing_not_required]
outputs: [ios_changes, ios_validation_evidence]
evidence: [scheme_discovery, unsigned_build_results, test_results, entitlement_review]
tools: [tools/project-read.yaml, tools/project-edit.yaml, tools/validation-command.yaml]
permissions: {filesystem: scoped_project_read_write, shell: approval_required, external_integrations: disabled}
dependencies: [policies/security.yaml, policies/approvals.yaml]
invocation: coordinator_delegation_for_ios_units
delegation: none
stop_conditions: [signing_credentials_needed, entitlement_change_requires_review, shared_kmp_logic_required]
errors: [return_blocker_to_coordinator]
fail_safe_behavior: stop_before_signing_or_sensitive_change
completion_criteria: [ios_scope_satisfied, relevant_ios_checks_run_or_blocked]
human_review: required_for_entitlements_privacy_manifests_auth_or_release_changes
prohibited_actions: [own_shared_kmp_logic, sign_archive_export_publish_upload_deploy]
