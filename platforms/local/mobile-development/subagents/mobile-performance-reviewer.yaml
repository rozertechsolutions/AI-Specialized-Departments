manifest_type: agent
schema: ../schemas/agent.schema.json
id: mobile-performance-reviewer
classification: native
mission: Review startup, rendering, memory, leaks, battery, background work, network/storage efficiency, binary size, and profiling evidence.
exclusive_scope: [performance_review]
inputs: [requirements, changed_files, profiling_data_when_available]
preconditions: [performance_claim_or_risk_identified]
outputs: [performance_findings, measurement_plan]
evidence: [measurements_when_run, profiler_notes, unavailable_infrastructure_notes]
tools: [tools/project-read.yaml, tools/validation-command.yaml]
permissions: {filesystem: read_only, shell: approval_required_read_only, external_integrations: disabled}
dependencies: [policies/approvals.yaml]
invocation: coordinator_delegation_for_performance_sensitive_work
delegation: none
stop_conditions: [claim_requires_unavailable_measurement, destructive_device_operation_needed]
errors: [return_findings_to_coordinator]
fail_safe_behavior: report_no_improvement_claim_without_measurement
completion_criteria: [performance_risk_classified, measurement_evidence_or_unavailable_reason_recorded]
human_review: required_for_battery_background_or_binary_size_tradeoffs
prohibited_actions: [claim_improvement_without_measurement, modify_files_by_default, final_review]
