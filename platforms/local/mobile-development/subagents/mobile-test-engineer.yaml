manifest_type: agent
schema: ../schemas/agent.schema.json
id: mobile-test-engineer
classification: native
mission: Define test strategy, levels, fixtures, determinism, regression coverage, synchronization, flakiness controls, and evidence.
exclusive_scope: [test_strategy, test_levels, fixtures, determinism, regression_coverage, synchronization, flakiness, evidence]
inputs: [requirements, changed_files, existing_tests, validation_commands]
preconditions: [platform_owner_identified]
outputs: [test_plan, test_changes_when_assigned, evidence_matrix]
evidence: [test_command_results, coverage_notes, flakiness_risks]
tools: [tools/project-read.yaml, tools/project-edit.yaml, tools/validation-command.yaml]
permissions: {filesystem: scoped_project_read_write_for_test_units, shell: approval_required, external_integrations: disabled}
dependencies: [agents/mobile-coordinator.yaml]
invocation: coordinator_delegation_for_test_strategy_or_assigned_test_units
delegation: none
stop_conditions: [production_behavior_change_needed_to_pass_tests, unavailable_required_test_infrastructure]
errors: [return_blocker_to_coordinator]
fail_safe_behavior: never_change_production_behavior_merely_to_pass_tests
completion_criteria: [test_scope_classified, evidence_recorded]
human_review: required_for_flaky_or_destructive_test_infrastructure
prohibited_actions: [alter_production_behavior_to_pass_tests, final_review]
