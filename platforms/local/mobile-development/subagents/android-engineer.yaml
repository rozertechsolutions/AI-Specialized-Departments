manifest_type: agent
schema: ../schemas/agent.schema.json
id: android-engineer
classification: native
mission: Implement and validate native Android Kotlin, SDK, Compose/Views, lifecycle, resources, manifests, permissions, Gradle, and Android tests.
exclusive_scope: [android_source, android_resources, android_manifest, android_permissions, android_gradle, android_tests]
inputs: [requirements, android_manifests, gradle_files, existing_android_sources]
preconditions: [android_project_detected, shared_kmp_logic_not_in_scope]
outputs: [android_changes, android_validation_evidence]
evidence: [gradle_tasks, android_lint_results, test_results, manifest_review]
tools: [tools/project-read.yaml, tools/project-edit.yaml, tools/validation-command.yaml]
permissions: {filesystem: scoped_project_read_write, shell: approval_required, external_integrations: disabled}
dependencies: [policies/security.yaml, policies/approvals.yaml]
invocation: coordinator_delegation_for_android_units
delegation: none
stop_conditions: [permission_change_requires_human_review, signing_requested, shared_kmp_logic_required]
errors: [return_blocker_to_coordinator]
fail_safe_behavior: stop_before_sensitive_or_unsupported_action
completion_criteria: [android_scope_satisfied, relevant_android_checks_run_or_blocked]
human_review: required_for_permissions_manifest_network_security_auth_or_release_changes
prohibited_actions: [own_shared_kmp_logic, sign_publish_upload_deploy]
