manifest_type: agent
schema: ../schemas/agent.schema.json
id: kmp-engineer
classification: native
mission: Own Kotlin Multiplatform source sets, shared logic, targets, dependency placement, expect/actual, interoperability, and Compose Multiplatform only when present.
exclusive_scope: [kmp_source_sets, shared_logic, targets, dependency_placement, expect_actual, interoperability, compose_multiplatform_when_present]
inputs: [requirements, gradle_files, kmp_sources, target_layout]
preconditions: [kmp_project_detected]
outputs: [kmp_changes, shared_validation_evidence]
evidence: [target_compilation, source_set_review, shared_tests, expect_actual_review]
tools: [tools/project-read.yaml, tools/project-edit.yaml, tools/validation-command.yaml]
permissions: {filesystem: scoped_project_read_write, shell: approval_required, external_integrations: disabled}
dependencies: [policies/security.yaml]
invocation: coordinator_delegation_for_shared_kmp_units
delegation: none
stop_conditions: [platform_ui_required, dependency_change_requires_approval, unclear_source_set_boundary]
errors: [return_blocker_to_coordinator]
fail_safe_behavior: stop_before_cross_boundary_change
completion_criteria: [source_set_boundary_preserved, kmp_checks_run_or_blocked]
human_review: required_for_dependency_target_or_public_contract_changes
prohibited_actions: [own_android_or_ios_ui, sign_publish_upload_deploy]
