manifest_type: tool-contract
schema: ../schemas/tool.schema.json
id: validation-command
classification: native
purpose: Run discovered project validation commands under approval-controlled shell policy.
allowed_operations: [run_discovered_format_lint_typecheck_build_test]
denied_operations: [install_global_software, sign, publish, upload, deploy, destructive_commands, use_production_credentials]
inputs: [command, working_directory, evidence_goal]
outputs: [exit_code, stdout_summary, stderr_summary]
approval_required: true
fail_safe_behavior: do_not_report_success_unless_command_succeeds
