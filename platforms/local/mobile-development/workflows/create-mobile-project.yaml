manifest_type: workflow
schema: ../schemas/workflow.schema.json
id: create-mobile-project
classification: native
objective: Create or scaffold a mobile project only after the platform, target framework, identifiers, and validation requirements are explicitly provided or discovered.
trigger: human_request
inputs: [target_technology, product_requirements, identifiers, supported_targets]
supported_technologies: [android, ios, kotlin-multiplatform, flutter, react-native]
preconditions: [target_directory_approved, identifiers_not_invented, dependency_additions_approved]
primary_owner: mobile-architect
reviewers: [mobile-security-reviewer, mobile-test-engineer, mobile-code-reviewer]
steps: [inspect_target_root, confirm_framework_and_identifiers, define_module_boundaries, delegate_scaffold_units, run_discovered_validation, independent_review]
validation_gates: [configuration_valid, compile_or_report_unavailable, tests_or_report_unavailable, secret_scan_review]
failures: [missing_identifiers, unsupported_framework, dependency_or_sdk_unavailable]
stop_conditions: [requires_installation_without_approval, signing_or_publishing_requested]
evidence: [created_files, commands_run, unavailable_infrastructure]
outputs: [project_skeleton, validation_report]
acceptance_criteria: [required_scope_implemented, no_placeholders, validation_evidence_recorded]
human_approvals: [new_dependencies, external_services, identifiers, target_directory]
prohibited_actions: [invent_identifiers, activate_integrations, sign_publish_upload_deploy]
