manifest_type: hooks
schema: ../schemas/hook.schema.json
classification: native
hooks:
  - id: mobile-command-guard
    file: mobile_command_guard.py
    event: before_command
    mode: inspect_only
    modifies_source: false
    uses_network: false
  - id: protected-file-guard
    file: protected_file_guard.py
    event: before_file_access
    mode: inspect_only
    modifies_source: false
    uses_network: false
  - id: release-action-guard
    file: release_action_guard.py
    event: before_command
    mode: inspect_only
    modifies_source: false
    uses_network: false
  - id: sensitive-change-guard
    file: sensitive_change_guard.py
    event: before_patch
    mode: inspect_only
    modifies_source: false
    uses_network: false
fail_safe_behavior: block_on_malformed_input
