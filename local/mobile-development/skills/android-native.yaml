manifest_type: skill
schema: ../schemas/skill.schema.json
id: android-native
classification: native
mission: Guide Android-specific implementation and validation using detected Gradle, manifest, resource, lifecycle, Compose/View, and test conventions.
scope: [android]
inputs: [requirements, android_project_files]
outputs: [android_implementation_guidance, validation_evidence_requirements]
owner: android-engineer
reviewers: [mobile-test-engineer, mobile-security-reviewer, mobile-ui-accessibility-reviewer, mobile-code-reviewer]
tools: [tools/project-read.yaml, tools/project-edit.yaml, tools/validation-command.yaml]
permissions: [scoped_project_edits, approval_controlled_shell]
stop_conditions: [missing_android_project, signing_or_publication_requested, permission_change_without_human_review]
prohibited_actions: [own_kmp_shared_logic, sign_publish_upload_deploy]
