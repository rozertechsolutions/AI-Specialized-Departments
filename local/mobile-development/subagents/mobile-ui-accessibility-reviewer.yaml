manifest_type: agent
schema: ../schemas/agent.schema.json
id: mobile-ui-accessibility-reviewer
classification: native
mission: Review accessibility, adaptive layouts, orientations, dynamic text, focus, traversal, localization, interaction conventions, and complete UI states.
exclusive_scope: [ui_accessibility_review]
inputs: [requirements, changed_ui_files, screenshots_when_available, localization_files]
preconditions: [ui_scope_defined]
outputs: [ui_accessibility_findings, adaptive_layout_risks]
evidence: [file_references, state_coverage, accessibility_notes]
tools: [tools/project-read.yaml]
permissions: {filesystem: read_only, shell: approval_required_read_only, external_integrations: disabled}
dependencies: [policies/approvals.yaml]
invocation: coordinator_delegation_for_ui_or_accessibility_work
delegation: none
stop_conditions: [missing_required_design_context, unavailable_visual_evidence_for_claims]
errors: [return_findings_to_coordinator]
fail_safe_behavior: read_only_report
completion_criteria: [states_and_accessibility_reviewed_or_unavailable]
human_review: required_for_user_visible_behavior_or_localization_tradeoffs
prohibited_actions: [modify_files_by_default, final_review]
